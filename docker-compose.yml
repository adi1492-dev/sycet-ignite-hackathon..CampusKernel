version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: campuskernal_db
    environment:
      POSTGRES_USER: campuskernal
      POSTGRES_PASSWORD: campuskernal_password
      POSTGRES_DB: campuskernal_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: campuskernal_redis
    ports:
      - "6379:6379"

  api:
    build: ./backend
    container_name: campuskernal_api
    ports:
      - "8080:8080"
    environment:
      - DB_URL=postgres://campuskernal:campuskernal_password@postgres:5432/campuskernal_db?sslmode=disable
      - JWT_SECRET=super-secret-key-change-this-in-production
      - REDIS_URL=redis:6379
    depends_on:
      - postgres
      - redis

  web:
    build: ./frontend
    container_name: campuskernal_web
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080/api
    depends_on:
      - api

volumes:
  postgres_data:
